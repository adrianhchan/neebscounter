<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neebs's Counter</title>
    <style>
        :root {
            --bg-color: #F9F6F0; /* Soft oatmeal */
            --text-color: #2D232E; /* Deep plum */
            --primary-btn: #D98880; /* Warm rose */
            --primary-btn-hover: #C07068;
            --secondary-btn: #5D6D7E; /* Slate */
            --secondary-btn-hover: #4A5868;
            --danger-btn: #E74C3C;
            --panel-bg: #f0ebe1;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Fixed to viewport height to prevent scroll */
            overflow: hidden;
            text-align: center;
            touch-action: manipulation; /* Prevents double-tap zooming */
        }

        .container {
            width: 92%;
            max-width: 400px;
            padding: 1.2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            box-sizing: border-box;
            max-height: 98vh; /* Fallback for very small screens */
            display: flex;
            flex-direction: column;
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.8rem;
            color: var(--text-color);
        }

        /* Setup Screen */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: auto 0;
        }

        input[type="number"] {
            font-size: 1.5rem;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            width: 80%;
            margin: 0 auto;
        }

        /* Main Counter Screen */
        #counter-screen {
            display: none; /* Hidden initially */
            flex-direction: column;
            gap: 0.8rem; /* Tightened gap for mobile fit */
            align-items: center;
            flex: 1;
            justify-content: space-between;
        }

        .max-display {
            font-size: 1.1rem;
            color: #888;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        /* Circular Progress Bar */
        .display-container {
            position: relative;
            width: 170px; /* Scaled down slightly */
            height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .count-display {
            font-size: 4.5rem; /* Scaled down slightly */
            font-weight: 900;
            line-height: 1;
            color: var(--text-color);
            position: absolute;
            z-index: 10;
        }

        .progress-ring {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s ease;
        }

        .progress-ring__circle--bg { stroke: #eee; }
        .progress-ring__circle--fg {
            stroke: var(--primary-btn);
            stroke-dasharray: 565.48; /* Circumference for r=90 */
            stroke-dashoffset: 565.48; 
        }

        /* General Buttons */
        button {
            border: none;
            border-radius: 12px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            touch-action: manipulation;
        }

        button:active { transform: scale(0.95); }

        /* Main Controls */
        .main-controls {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn-start { background-color: var(--primary-btn); padding: 1rem; font-size: 1.2rem; width: 100%; }
        .btn-start:hover { background-color: var(--primary-btn-hover); }

        .btn-increment {
            background-color: var(--primary-btn);
            font-size: 1.5rem;
            padding: 1rem;
            width: 100%;
        }
        .btn-increment:hover { background-color: var(--primary-btn-hover); }

        .controls-row {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        .btn-decrement { background-color: var(--secondary-btn); padding: 0.8rem; flex: 1; font-size: 1.2rem; }
        .btn-reset { 
            background-color: transparent;
            color: var(--danger-btn);
            border: 2px solid var(--danger-btn);
            padding: 0.8rem; 
            flex: 1;
            font-size: 1.2rem;
        }

        /* Secondary Counter Panel */
        .sub-counter-panel {
            background-color: var(--panel-bg);
            border-radius: 15px;
            padding: 0.8rem;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .sub-header {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary-btn);
            font-weight: 800;
        }

        .sub-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .sub-count-display {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--text-color);
            min-width: 50px;
        }

        .btn-sub {
            background-color: var(--secondary-btn);
            padding: 0.6rem 1.5rem;
            font-size: 1.5rem;
            border-radius: 8px;
        }

        .btn-sub-reset {
            background: transparent;
            color: var(--secondary-btn);
            border: none;
            text-decoration: underline;
            font-size: 0.9rem;
            padding: 0.2rem;
            align-self: center;
        }

        /* New Project Link */
        .btn-new-project {
            background-color: transparent;
            color: var(--secondary-btn);
            font-size: 0.9rem;
            padding: 0.5rem;
            text-decoration: underline;
            margin-top: 0.2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="setup-screen">
            <h1>Neebs's Counter</h1>
            <label for="max-input">Target stitches/rows:</label>
            <input type="number" id="max-input" placeholder="e.g., 50" min="1">
            <button class="btn-start" onclick="startCounting()">Start Knitting</button>
        </div>

        <div id="counter-screen">
            
            <div class="max-display">Target: <span id="max-display-val">0</span></div>
            
            <div class="display-container">
                <svg class="progress-ring" viewBox="0 0 200 200">
                    <circle class="progress-ring__circle progress-ring__circle--bg" cx="100" cy="100" r="90" fill="none" stroke-width="15"></circle>
                    <circle class="progress-ring__circle progress-ring__circle--fg" cx="100" cy="100" r="90" fill="none" stroke-width="15"></circle>
                </svg>
                <div class="count-display" id="current-count">0</div>
            </div>
            
            <div class="main-controls">
                <button class="btn-increment" onclick="incrementMain()">+ Main Count</button>
                <div class="controls-row">
                    <button class="btn-decrement" onclick="decrementMain()">- 1</button>
                    <button class="btn-reset" onclick="resetMain()">Reset</button>
                </div>
            </div>

            <div class="sub-counter-panel">
                <div class="sub-header">Secondary Track</div>
                <div class="sub-controls">
                    <button class="btn-sub" onclick="decrementSub()">-</button>
                    <div class="sub-count-display" id="sub-count">0</div>
                    <button class="btn-sub" onclick="incrementSub()">+</button>
                </div>
                <button class="btn-sub-reset" onclick="resetSub()">Reset Secondary Track</button>
            </div>
            
            <button class="btn-new-project" onclick="newProject()">Start New Project</button>
        </div>
    </div>

    <script>
        // State variables
        let mainCount = 0;
        let maxCount = 0;
        let subCount = 0;
        
        // Progress Bar Circumference (2 * pi * r(90))
        const circumference = 565.48; 

        // DOM Elements
        const setupScreen = document.getElementById('setup-screen');
        const counterScreen = document.getElementById('counter-screen');
        const countDisplay = document.getElementById('current-count');
        const maxDisplayVal = document.getElementById('max-display-val');
        const maxInput = document.getElementById('max-input');
        const progressCircleFg = document.querySelector('.progress-ring__circle--fg');
        const subCountDisplay = document.getElementById('sub-count');

        // Initialize App
        function init() {
            const savedMain = localStorage.getItem('neebs_count');
            const savedMax = localStorage.getItem('neebs_maxCount');
            const savedSub = localStorage.getItem('neebs_subCount');

            if (savedMax !== null) {
                mainCount = parseInt(savedMain) || 0;
                maxCount = parseInt(savedMax);
                subCount = parseInt(savedSub) || 0;
                showCounterScreen();
                updateDisplay();
            }
        }

        function startCounting() {
            const inputVal = parseInt(maxInput.value);
            if (!inputVal || inputVal <= 0) {
                alert("Please enter a valid target greater than 0.");
                return;
            }
            maxCount = inputVal;
            mainCount = 0;
            subCount = 0;
            saveState();
            showCounterScreen();
            updateDisplay();
        }

        /* --- Main Counter Logic --- */
        function incrementMain() {
            if (mainCount < maxCount) {
                mainCount++;
                updateDisplay();
                saveState();
                
                if (mainCount === maxCount) {
                    setTimeout(() => alert(`Target reached! You hit ${maxCount}.`), 50);
                }
            }
        }

        function decrementMain() {
            if (mainCount > 0) {
                mainCount--;
                updateDisplay();
                saveState();
            }
        }

        function resetMain() {
            if (confirm("Reset your main count back to 0?")) {
                mainCount = 0;
                updateDisplay();
                saveState();
            }
        }

        /* --- Secondary Counter Logic --- */
        function incrementSub() {
            subCount++;
            updateDisplay();
            saveState();
        }

        function decrementSub() {
            if (subCount > 0) {
                subCount--;
                updateDisplay();
                saveState();
            }
        }

        function resetSub() {
            if (confirm("Reset the secondary track to 0?")) {
                subCount = 0;
                updateDisplay();
                saveState();
            }
        }

        /* --- Global Logic --- */
        function newProject() {
            if (confirm("Start a new project? This erases both counters and your target.")) {
                localStorage.removeItem('neebs_count');
                localStorage.removeItem('neebs_maxCount');
                localStorage.removeItem('neebs_subCount');
                maxInput.value = '';
                setupScreen.style.display = 'flex';
                counterScreen.style.display = 'none';
            }
        }

        function updateDisplay() {
            // Update Text
            countDisplay.innerText = mainCount;
            maxDisplayVal.innerText = maxCount;
            subCountDisplay.innerText = subCount;
            
            // Update Ring
            if (maxCount > 0) {
                const progressFraction = mainCount / maxCount;
                const offset = circumference * (1 - progressFraction);
                progressCircleFg.style.strokeDashoffset = offset;
            } else {
                progressCircleFg.style.strokeDashoffset = circumference;
            }
        }

        function showCounterScreen() {
            setupScreen.style.display = 'none';
            counterScreen.style.display = 'flex';
        }

        function saveState() {
            localStorage.setItem('neebs_count', mainCount);
            localStorage.setItem('neebs_maxCount', maxCount);
            localStorage.setItem('neebs_subCount', subCount);
        }

        init();
    </script>
</body>
</html>
