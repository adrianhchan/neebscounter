<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neebs's Counter</title>
    <style>
        :root {
            --bg-color: #F9F6F0; /* Soft oatmeal */
            --text-color: #2D232E; /* Deep plum */
            --primary-btn: #D98880; /* Warm rose */
            --primary-btn-hover: #C07068;
            --secondary-btn: #5D6D7E; /* Slate */
            --secondary-btn-hover: #4A5868;
            --danger-btn: #E74C3C;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            touch-action: manipulation; /* Prevents double-tap zooming on mobile */
        }

        /* NEW: Global Title Style */
        .global-title {
            margin: 0 0 2rem 0;
            font-size: 2rem;
            color: var(--text-color);
            font-weight: 700;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        h1 {
            margin-top: 0;
            font-size: 1.8rem;
            color: var(--text-color);
        }

        /* Setup Screen */
        #setup-screen {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        input[type="number"] {
            font-size: 1.5rem;
            padding: 0.8rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            width: 80%;
            margin: 0 auto;
        }

        /* Main Counter Screen */
        #counter-screen {
            display: none; /* Hidden initially */
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .max-display {
            font-size: 1.2rem;
            color: #888;
            font-weight: bold;
        }

        /* NEW: Circular Progress Bar Container and Styling */
        .display-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1rem 0;
        }

        .count-display {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            color: var(--text-color);
            position: absolute; /* Place text on top of SVG */
            z-index: 10;
        }

        .progress-ring {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg); /* Start progress from top */
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.1s ease; /* Smooth filling */
        }

        .progress-ring__circle--bg {
            stroke: #eee;
        }

        .progress-ring__circle--fg {
            stroke: var(--primary-btn);
            /* Circumference for radius=110 is ~691px. Set to full initial offset */
            stroke-dasharray: 691;
            stroke-dashoffset: 691; 
        }

        /* Buttons */
        button {
            border: none;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 100%;
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-start { background-color: var(--primary-btn); }
        .btn-start:hover { background-color: var(--primary-btn-hover); }

        .btn-increment {
            background-color: var(--primary-btn);
            font-size: 1.8rem;
            padding: 1.5rem;
        }
        .btn-increment:hover { background-color: var(--primary-btn-hover); }

        .btn-decrement { background-color: var(--secondary-btn); }
        .btn-decrement:hover { background-color: var(--secondary-btn-hover); }

        .btn-reset { 
            background-color: transparent;
            color: var(--danger-btn);
            border: 2px solid var(--danger-btn);
        }
        .btn-reset:hover {
            background-color: rgba(231, 76, 60, 0.1);
        }
        
        .btn-new-project {
            background-color: transparent;
            color: var(--secondary-btn);
            font-size: 1rem;
            padding: 0.5rem;
            margin-top: 1rem;
            text-decoration: underline;
        }

        .controls-row {
            display: flex;
            gap: 1rem;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="global-title">You can do it, Neebs!</div>

    <div class="container">
        <div id="setup-screen">
            <h1>Neebs's Counter</h1>
            <label for="max-input">How many stitches/rows to count to?</label>
            <input type="number" id="max-input" placeholder="e.g., 50" min="1">
            <button class="btn-start" onclick="startCounting()">Start Knitting</button>
        </div>

        <div id="counter-screen">
            <div class="max-display">Target: <span id="max-display-val">0</span></div>
            
            <div class="display-container">
                <svg class="progress-ring" viewBox="0 0 240 240">
                    <circle class="progress-ring__circle progress-ring__circle--bg" cx="120" cy="120" r="110" fill="none" stroke-width="20"></circle>
                    <circle class="progress-ring__circle progress-ring__circle--fg" cx="120" cy="120" r="110" fill="none" stroke-width="20"></circle>
                </svg>
                <div class="count-display" id="current-count">0</div>
            </div>
            
            <button class="btn-increment" onclick="increment()">+ Count</button>
            
            <div class="controls-row">
                <button class="btn-decrement" onclick="decrement()">- 1</button>
                <button class="btn-reset" onclick="resetCount()">Reset</button>
            </div>
            
            <button class="btn-new-project" onclick="newProject()">Start New Project</button>
        </div>
    </div>

    <script>
        // State variables
        let count = 0;
        let maxCount = 0;
        // NEW: Progress Bar Circumference (2 * pi * radius of 110)
        const circumference = 2 * Math.PI * 110; 

        // DOM Elements
        const setupScreen = document.getElementById('setup-screen');
        const counterScreen = document.getElementById('counter-screen');
        const countDisplay = document.getElementById('current-count');
        const maxDisplayVal = document.getElementById('max-display-val');
        const maxInput = document.getElementById('max-input');
        const progressCircleFg = document.querySelector('.progress-ring__circle--fg'); // NEW: Progress circle

        // Initialize App on load
        function init() {
            const savedCount = localStorage.getItem('neebs_count');
            const savedMax = localStorage.getItem('neebs_maxCount');

            if (savedMax !== null) {
                // Restore previous session
                count = parseInt(savedCount) || 0;
                maxCount = parseInt(savedMax);
                showCounterScreen();
                updateDisplay();
            }
        }

        function startCounting() {
            const inputVal = parseInt(maxInput.value);
            if (!inputVal || inputVal <= 0) {
                alert("Please enter a valid number greater than 0.");
                return;
            }
            maxCount = inputVal;
            count = 0;
            saveState();
            showCounterScreen();
            updateDisplay();
        }

        function increment() {
            if (count < maxCount) {
                count++;
                updateDisplay();
                saveState();
                
                // Alert when target is reached
                if (count === maxCount) {
                    // Small timeout ensures the number updates visually before the alert blocks the screen
                    setTimeout(() => {
                        alert(`Target reached! You hit ${maxCount}.`);
                    }, 50);
                }
            }
        }

        function decrement() {
            if (count > 0) {
                count--;
                updateDisplay();
                saveState();
            }
        }

        function resetCount() {
            if (confirm("Are you sure you want to reset your count back to 0?")) {
                count = 0;
                updateDisplay();
                saveState();
            }
        }

        function newProject() {
            if (confirm("Start a new project? This will erase your current count and target.")) {
                localStorage.removeItem('neebs_count');
                localStorage.removeItem('neebs_maxCount');
                maxInput.value = '';
                setupScreen.style.display = 'flex';
                counterScreen.style.display = 'none';
            }
        }

        function updateDisplay() {
            countDisplay.innerText = count;
            maxDisplayVal.innerText = maxCount;
            
            // NEW: Update Circular Progress Bar
            if (maxCount > 0) {
                const progressFraction = count / maxCount;
                const offset = circumference * (1 - progressFraction);
                progressCircleFg.style.strokeDashoffset = offset;
            } else {
                // Initial state/error prevention
                progressCircleFg.style.strokeDashoffset = circumference;
            }
        }

        function showCounterScreen() {
            setupScreen.style.display = 'none';
            counterScreen.style.display = 'flex';
        }

        function saveState() {
            localStorage.setItem('neebs_count', count);
            localStorage.setItem('neebs_maxCount', maxCount);
        }

        // Run initialization
        init();
    </script>
</body>
</html>
